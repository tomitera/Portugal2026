<style>

*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:#fefcf9;color:var(--texto);font-family:Georgia,'Times New Roman',serif;max-width:853px;margin-inline:auto;min-height:100vh;-webkit-tap-highlight-color:transparent}.screen{display:none;min-height:100vh}.screen.active{display:block}.home{position:relative}.home img{display:block;width:100%;height:auto}.city-grid{position:absolute;inset-inline:0;top:56.7%;display:grid;grid-template-columns:1fr 1fr;gap:clamp(11px,2.5vw,22px) clamp(15px,3.2vw,28px);padding:0 clamp(30px,11.7vw,100px)}.city-btn{border:0;background:none;padding:0;line-height:0;cursor:pointer}.city-btn img{width:100%;height:auto;display:block}.city-btn.wide{grid-column:1/-1}.header{background:var(--claro);border-bottom:1px solid var(--areia);padding:18px 16px;text-align:center;position:sticky;top:0;z-index:20}.header small{display:block;letter-spacing:2px;text-transform:uppercase;color:var(--suave);font-size:11px}.header h1{font-size:21px;font-weight:400;color:var(--azul2);margin:4px 0 0}.toolbar{display:flex;gap:10px;padding:10px 16px}.btn{border:1px solid var(--areia);background:white;border-radius:13px;padding:12px 14px;font:inherit;color:var(--azul2);box-shadow:var(--sombra);cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:7px}.btn.primary{background:var(--azul);color:#fff;border-color:var(--azul)}.day-list{padding:4px 16px 90px;display:grid;gap:11px}.day-card{border:1px solid var(--areia);background:#fff;border-radius:var(--r);box-shadow:var(--sombra);padding:15px;display:flex;align-items:center;gap:13px;cursor:pointer}.badge{width:44px;height:44px;border-radius:50%;background:var(--azul);color:white;display:grid;place-items:center;font-size:12px;font-weight:bold;flex:0 0 auto}.day-card strong{font-size:15px}.arrow{margin-left:auto;color:var(--suave)}.map-wrap{margin:15px;border:1px solid var(--areia);border-radius:var(--r);overflow:hidden;position:relative;background:var(--claro);box-shadow:var(--sombra);scroll-margin-top:90px}.map-wrap img{width:100%;display:block}.hotspot{position:absolute;border:0;background:rgba(255,255,255,.001);cursor:pointer;border-radius:50%;outline:none}.hotspot:focus-visible{box-shadow:0 0 0 4px rgba(255,183,64,.9);background:rgba(255,255,255,.25)}.hint{font-size:12px;color:var(--suave);text-align:center;padding:0 16px 9px}.topic-nav{display:flex;gap:8px;overflow-x:auto;padding:0 16px 13px;scrollbar-width:none}.topic-nav::-webkit-scrollbar{display:none}.topic-chip{white-space:nowrap;border:1px solid var(--areia);border-radius:999px;background:white;padding:10px 13px;color:var(--azul);font:inherit;font-size:13px;cursor:pointer}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px 16px}.actions .btn.full{grid-column:1/-1}.article{padding:0 16px 96px}.article-section{display:none;background:#fff;border:1px solid var(--areia);border-radius:var(--r);box-shadow:var(--sombra);padding:18px;margin-bottom:14px;line-height:1.72;font-size:15px;scroll-margin-top:84px}.article-section.open{display:block}.article-section h2{margin:0 0 3px;color:var(--azul);font-size:22px}.article-section h3{margin:0 0 15px;color:var(--terracota);font-weight:400;font-style:italic;font-size:16px}.article-section p{margin:0 0 12px}.section-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}.footer{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:853px;background:rgba(254,252,249,.96);backdrop-filter:blur(8px);border-top:1px solid var(--areia);display:flex;gap:10px;padding:9px 16px calc(9px + env(safe-area-inset-bottom));z-index:30}.footer .btn{flex:1}.notice{margin:20px 16px;background:var(--claro);border:1px solid var(--areia);border-radius:var(--r);padding:22px;text-align:center;line-height:1.6}.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}@media(max-width:430px){.article-section{font-size:14.5px}.header h1{font-size:19px}}

<body>
<section class="screen active" id="home"><div class="home"><img src="home_bg.png" alt="Portugal 2026 – Um Companheiro de Viagem"><div class="city-grid" id="cityGrid"></div></div></section>
<section class="screen" id="city"><header class="header"><small id="cityStay"></small><h1 id="cityName"></h1></header><div class="toolbar"><button class="btn" onclick="goHome()">← Home</button></div><div class="day-list" id="dayList"></div><div class="footer"><button class="btn primary" onclick="goHome()">🏠 Portugal</button></div></section>
<section class="screen" id="day"><header class="header"><small id="dayLabel"></small><h1 id="dayTitle"></h1></header><div class="map-wrap" id="mapWrap"><img id="mapImg" alt=""><div id="hotspots"></div></div><div class="hint">Toque nos pontos do mapa ou use os atalhos abaixo.</div><div class="topic-nav" id="topicNav"></div><div class="actions"><button class="btn" onclick="openPanel('comer')">🍽️ Onde comer</button><button class="btn" onclick="openPanel('foto')">📷 Foto clássica</button><a class="btn primary full" id="mapsLink" target="_blank" rel="noopener noreferrer">📍 Abrir no Google Maps</a></div><main class="article" id="article"></main><div class="footer"><button class="btn" onclick="backCity()">← Dias</button><button class="btn primary" onclick="goHome()">🏠 Portugal</button></div></section>
<script>
const HOME_ORDER=['lisboa','sintra','obidos','nazare','fatima','evora','algarve','porto','douro'];
const BUTTONS={lisboa:'bt_lisboa.png',sintra:'bt_sintra.png',obidos:'bt_obidos.png',nazare:'bt_nazare.png',fatima:'bt_fatima.png',evora:'bt_evora.png',algarve:'bt_algarve.png',porto:'bt_porto.png',douro:'bt_douro.png'};
const p=(title,subtitle,body,query,x,y,w=7,h=5)=>({title,subtitle,body,query,x,y,w,h});
const DATA={
 lisboa:{name:'Lisboa',stay:'6 dias',days:[
 {id:'d1',label:'D1',title:'A Lisboa que renasceu',map:'mapa_d1.png',maps:'https://www.google.com/maps/search/?api=1&query=Praça+do+Comércio+Lisboa',points:[
 p('Avenida da Liberdade','Elegância e modernização',`<p>Poucos lugares representam tão bem a elegância de Lisboa quanto a Avenida da Liberdade. Seus jardins, árvores e edifícios históricos fazem dela um dos endereços mais prestigiados da cidade.</p><p>Inspirada nos grandes boulevards europeus do século XIX, tornou-se símbolo da modernização de Lisboa. Mais do que um centro comercial, revela como a cidade soube crescer mantendo uma escala humana.</p>`,'Avenida da Liberdade Lisboa',28,30),
 p('Praça dos Restauradores','A independência recuperada',`<p>O obelisco erguido no centro recorda a Restauração da Independência, em 1640, quando Portugal recuperou sua autonomia após sessenta anos de domínio espanhol.</p><p>Para quem conhece sua história, a praça representa a afirmação da identidade portuguesa e o início de uma nova etapa para o reino.</p>`,'Praça dos Restauradores Lisboa',30,40),
 p('Rossio','O coração da vida pública',`<p>Durante séculos, o Rossio foi palco de acontecimentos políticos, festas populares, celebrações religiosas e manifestações. Reis, comerciantes, estudantes e viajantes cruzaram este espaço muito antes da reconstrução pombalina.</p><p>O desenho ondulado da calçada portuguesa tornou-se um dos símbolos urbanos mais conhecidos de Portugal.</p>`,'Rossio Lisboa',27,47),
 p('Rua Augusta','O eixo da nova Lisboa',`<p>A regularidade das fachadas revela que nada foi construído por acaso. Depois do terremoto de 1755, a Rua Augusta tornou-se um dos principais eixos da cidade planejada pelo Marquês de Pombal.</p><p>Sua largura, alinhamento e proporções refletem uma visão urbanística inovadora para a época.</p>`,'Rua Augusta Lisboa',30,54),
 p('Arco da Rua Augusta','Um portal para a reconstrução',`<p>Erguido como símbolo da reconstrução, o arco celebra a capacidade de Lisboa de seguir em frente. As esculturas de sua fachada homenageiam personagens e valores importantes da história portuguesa.</p><p>Do mirante, a geometria da Baixa Pombalina torna-se especialmente clara.</p>`,'Arco da Rua Augusta Lisboa',30,60),
 p('Praça do Comércio','A cidade aberta para o Tejo',`<p>Durante séculos, aqui funcionou o Palácio da Ribeira, residência oficial da família real e centro administrativo de um império que se estendia pela América, África e Ásia.</p><p>Depois do terremoto, o palácio não foi reconstruído. Em seu lugar surgiu uma grande praça aberta para o Tejo, símbolo de uma cidade voltada para o futuro.</p>`,'Praça do Comércio Lisboa',31,66)
 ],comer:'Entre o Rossio, a Rua Augusta e a Praça do Comércio, escolha uma opção que não exija grandes desvios. As indicações finais da Simone poderão ser inseridas aqui.',foto:'Praça do Comércio com o Arco da Rua Augusta ao fundo, preferencialmente no fim da tarde.'},
 {id:'d2',label:'D2',title:'Alfama — onde Lisboa nasceu',map:'mapa_d2.png',maps:'https://www.google.com/maps/search/?api=1&query=Sé+de+Lisboa',points:[
 p('Sé de Lisboa','O nascimento de um reino',`<p>A Sé é muito mais do que a igreja mais antiga da cidade. Sua construção começou logo após a conquista de Lisboa por D. Afonso Henriques, em 1147.</p><p>Erguida no lugar associado à principal mesquita da cidade islâmica, tornou-se símbolo da nova ordem política e religiosa. As torres e paredes robustas lembram uma fortaleza, transmitindo segurança e poder.</p>`,'Sé de Lisboa',10,29),
 p('Alfama','O coração medieval',`<p>O nome deriva do árabe <em>Al-hamma</em>, “as fontes” ou “os banhos”. Suas ruas estreitas foram moldadas pelas pessoas, pelo relevo e pelo comércio, e não por um plano urbano.</p><p>Alfama continua sendo um lugar vivo: moradores, cafés, roupas nas janelas e pequenos largos fazem parte da paisagem tanto quanto os monumentos.</p>`,'Alfama Lisboa',27,34),
 p('Miradouro de Santa Luzia','A varanda de Lisboa',`<p>O terraço oferece uma vista privilegiada sobre os telhados de Alfama e o estuário do Tejo. Os painéis de azulejos retratam episódios históricos, entre eles a Lisboa anterior ao terremoto.</p><p>É um lugar em que a paisagem explica silenciosamente boa parte da história da cidade.</p>`,'Miradouro de Santa Luzia Lisboa',26,40),
 p('Castelo de São Jorge','Onde Lisboa começou',`<p>Muito antes de existir Portugal, esta colina já era estratégica. Romanos, mouros e cristãos aproveitaram sua posição dominante.</p><p>Do alto das muralhas, compreende-se por que Lisboa nasceu aqui: o Tejo oferecia proteção, abastecimento, comércio e ligação com o Atlântico.</p>`,'Castelo de São Jorge Lisboa',24,47),
 p('Miradouro das Portas do Sol','Alfama vista do alto',`<p>Este grande miradouro permite observar o casario descendo em direção ao rio. A disposição aparentemente irregular das casas revela o crescimento orgânico da cidade medieval.</p>`,'Miradouro das Portas do Sol Lisboa',17,53),
 p('Panteão Nacional','Memória nacional',`<p>A antiga Igreja de Santa Engrácia tornou-se o Panteão Nacional. Sua cúpula domina a paisagem de Alfama e o terraço oferece uma visão ampla do bairro e do Tejo.</p>`,'Panteão Nacional Lisboa',22,59),
 p('Mosteiro de São Vicente de Fora','Azulejos e dinastia',`<p>Fundado no século XII e reconstruído posteriormente, o mosteiro reúne arquitetura, uma importante coleção de azulejos e o panteão da dinastia de Bragança.</p>`,'Mosteiro de São Vicente de Fora Lisboa',18,67),
 p('Miradouro da Graça','Um último olhar',`<p>Da Graça, Lisboa revela suas camadas: Alfama, o Castelo, a Baixa e o Tejo convivem na mesma paisagem.</p><p>É um ponto privilegiado para perceber como a cidade medieval e a cidade reconstruída se encaixam.</p>`,'Miradouro da Graça Lisboa',29,72)
 ],comer:'Alfama pede uma pausa sem pressa. Inserir aqui as escolhas da Simone próximas ao percurso e uma alternativa para fado, se o grupo desejar.',foto:'Miradouro de Santa Luzia com os telhados de Alfama e o Tejo ao fundo.'},
 {id:'d3',label:'D3',title:'Belém — onde Portugal encontrou o mundo',map:'mapa_d3.png',maps:'https://www.google.com/maps/search/?api=1&query=Mosteiro+dos+Jerónimos+Lisboa',points:[
 p('Mosteiro dos Jerónimos','A grande obra do manuelino',`<p>Construído no auge das navegações, o mosteiro traduz em pedra a confiança de um reino enriquecido pelas rotas oceânicas. Cordas, plantas, esferas e símbolos marítimos aparecem na decoração manuelina.</p><p>Os túmulos de Vasco da Gama e Luís de Camões reforçam sua ligação com a expansão portuguesa.</p>`,'Mosteiro dos Jerónimos Lisboa',7,42),
 p('Pastéis de Belém','Uma tradição desde 1837',`<p>A receita nasceu no contexto do Mosteiro dos Jerónimos e tornou-se uma das tradições gastronômicas mais conhecidas de Lisboa. A graça está tanto no sabor quanto no ambiente da antiga confeitaria.</p>`,'Pastéis de Belém',12,48),
 p('Padrão dos Descobrimentos','A memória monumental das navegações',`<p>O monumento reúne figuras ligadas à expansão marítima portuguesa. Mais do que decorar nomes, vale perceber como Portugal construiu uma narrativa nacional em torno do mar.</p><p>A rosa dos ventos no piso ajuda a visualizar a escala das rotas portuguesas.</p>`,'Padrão dos Descobrimentos Lisboa',30,53),
 p('Torre de Belém','Fortaleza e cartão-postal',`<p>A torre foi concebida para defender a entrada do Tejo e também para impressionar quem chegava à capital do império.</p><p>Sua escala delicada contrasta com a função militar e resume bem a estética manuelina.</p>`,'Torre de Belém Lisboa',5,60),
 p('Almoço com um amigo','Uma pausa pessoal na viagem',`<p>Este encontro não precisa obedecer a um roteiro rígido. O próprio guia pode guardar espaço para aquilo que nenhuma lista de atrações substitui: conversar, reencontrar alguém e viver a cidade por meio de quem mora nela.</p>`,'Torre de Belém Lisboa restaurantes',30,65),
 p('MAAT','Lisboa contemporânea à beira-rio',`<p>A arquitetura curva do museu cria uma relação direta com o Tejo. Mesmo sem visitar uma exposição, a área externa oferece um contraponto contemporâneo aos monumentos de Belém.</p>`,'MAAT Lisboa',29,72),
 p('Margem do Tejo','O rio como fio condutor',`<p>Belém faz mais sentido quando observada a partir do rio. O Tejo conectava Lisboa ao Atlântico e transformou uma capital europeia em centro de uma rede mundial.</p>`,'Passeio Marítimo de Belém Lisboa',16,79)
 ],comer:'O almoço com seu amigo é a principal referência do dia. Como alternativas, inserir restaurantes próximos à Torre de Belém e uma opção rápida perto dos Jerónimos.',foto:'Padrão dos Descobrimentos com o Tejo ao fundo ou Torre de Belém no fim da tarde.'},
 {id:'d4',label:'D4',title:'Parque das Nações — a Lisboa moderna',map:'mapa_d4.png',maps:'https://www.google.com/maps/search/?api=1&query=Oceanário+de+Lisboa',points:[
 p('Oceanário de Lisboa','Um oceano no centro da cidade',`<p>O grande tanque central cria a sensação de observar um único oceano partilhado por espécies de diferentes ambientes. O edifício nasceu para a Expo 98 e tornou-se uma das instituições mais visitadas de Lisboa.</p>`,'Oceanário de Lisboa',18,40),
 p('Teleférico das Nações','A margem vista do alto',`<p>O trajeto oferece uma leitura panorâmica do bairro, do Tejo e da Ponte Vasco da Gama. É menos uma atração histórica e mais uma forma agradável de perceber a escala do projeto urbano.</p>`,'Teleférico Parque das Nações Lisboa',36,46),
 p('Pavilhão do Conhecimento','Ciência para experimentar',`<p>O antigo edifício da Expo tornou-se um centro interativo dedicado à ciência. É especialmente interessante para quem gosta de aprender tocando, testando e observando fenômenos.</p>`,'Pavilhão do Conhecimento Lisboa',5,52),
 p('Passeio pela margem do Tejo','Uma cidade novamente aberta para o rio',`<p>A Expo 98 recuperou uma zona industrial e devolveu a margem aos moradores. Jardins, arte pública e arquitetura contemporânea mostram como Lisboa voltou a usar o Tejo como espaço de convivência.</p>`,'Passeio das Tágides Lisboa',28,61),
 p('Pavilhão de Portugal','Arquitetura em suspensão',`<p>A grande pala de concreto concebida por Álvaro Siza parece flutuar. É uma demonstração de como engenharia e leveza visual podem coexistir.</p>`,'Pavilhão de Portugal Lisboa',6,66),
 p('Zona ribeirinha','Uma pausa sem cerimônia',`<p>A Doca dos Olivais e seus arredores oferecem restaurantes e áreas abertas. Aqui o interesse está menos em “cumprir atrações” e mais em aproveitar o bairro.</p>`,'Doca dos Olivais Lisboa',26,67),
 p('Gare do Oriente e Vasco da Gama','A porta contemporânea de Lisboa',`<p>A Gare do Oriente, projetada por Santiago Calatrava, combina estrutura monumental e transparência. O centro comercial vizinho permite encaixar uma pausa ou compras sem desviar do percurso.</p>`,'Gare do Oriente Lisboa',15,77)
 ],comer:'A zona ribeirinha e o Centro Vasco da Gama oferecem muitas opções. Selecionar uma alternativa portuguesa e outra prática para um dia flexível.',foto:'Teleférico com o Tejo e a Ponte Vasco da Gama ao fundo.'},
 {id:'d5',label:'D5',title:'Lisboa sem pressa',map:'mapa_d5.png',maps:'https://www.google.com/maps/search/?api=1&query=LX+Factory+Lisboa',points:[
 p('LX Factory','Criatividade em antigas fábricas',`<p>O antigo complexo industrial foi ocupado por livrarias, ateliers, restaurantes e lojas independentes. A transformação preservou a memória fabril e criou um dos polos criativos da cidade.</p><p>A Livraria Ler Devagar é um dos espaços mais marcantes.</p>`,'LX Factory Lisboa',7,41),
 p('Chiado','A Lisboa literária e elegante',`<p>O Chiado reúne livrarias, cafés, teatros e lojas. A região permite observar uma Lisboa urbana que se reinventa sem abandonar sua tradição intelectual.</p>`,'Chiado Lisboa',35,54),
 p('El Corte Inglés','Compras sem complicação',`<p>Uma parada prática para reunir marcas, alimentação e serviços num só lugar. Neste dia livre, a utilidade pode ser tão importante quanto a história.</p>`,'El Corte Inglés Lisboa',29,75),
 p('Primark','Compras acessíveis',`<p>Uma opção direta para quem quer reservar algum tempo para compras sem transformar a viagem numa maratona comercial.</p>`,'Primark Lisboa',42,82),
 p('Almoço na zona ribeirinha','Tempo livre à mesa',`<p>A proposta é escolher conforme o momento, sem horário rígido. Uma refeição tranquila também é uma maneira de conhecer a cidade.</p>`,'Doca dos Olivais restaurantes Lisboa',47,63),
 p('Avenida da Liberdade','Voltar a caminhar sem objetivo',`<p>Mesmo conhecida no primeiro dia, a avenida pode ser vivida de outra forma: sem pressa, entrando em cafés, observando vitrines e deixando que o cotidiano determine o ritmo.</p>`,'Avenida da Liberdade Lisboa',43,34)
 ],comer:'Time Out Market pode funcionar como opção, mas não como obrigação. Inserir as escolhas da Simone no Chiado e na região da LX Factory.',foto:'Um detalhe espontâneo da cidade: fachada, café, livraria ou cena de rua.'},
 {id:'d6',label:'D6',title:'Lisboa Extra — escolha seu próprio dia',map:'mapa_d6.png',maps:'https://www.google.com/maps/search/?api=1&query=Cacilhas+Almada',points:[
 p('História','Convento do Carmo e Santa Justa',`<p>As ruínas abertas do Convento do Carmo são uma das imagens mais fortes do terremoto de 1755. O Elevador de Santa Justa, por sua vez, liga a Baixa ao Bairro Alto e revela a modernização do fim do século XIX.</p>`,'Convento do Carmo Lisboa',43,34,13,8),
 p('Arte','Museu Nacional do Azulejo',`<p>Instalado num antigo convento, o museu conta a história de uma arte que se tornou parte essencial da paisagem portuguesa. É uma escolha para quem deseja compreender os azulejos além de sua beleza decorativa.</p>`,'Museu Nacional do Azulejo Lisboa',38,55,13,8),
 p('Relaxar','Jardim da Estrela e Parque Eduardo VII',`<p>Os jardins oferecem uma Lisboa menos monumental e mais cotidiana. São lugares para caminhar, descansar e observar a cidade sem compromisso.</p>`,'Jardim da Estrela Lisboa',25,31,14,9),
 p('Viver Lisboa','Mercado de Campo de Ourique',`<p>O mercado combina bancas tradicionais e propostas contemporâneas. É uma boa escolha para provar, conversar e deixar que o almoço conduza o restante do dia.</p>`,'Mercado de Campo de Ourique Lisboa',18,51,15,9),
 p('Compras','Avenida da Liberdade e El Corte Inglés',`<p>Uma opção prática para as últimas compras e lembranças, especialmente porque a região fica próxima da hospedagem.</p>`,'El Corte Inglés Lisboa',19,66,16,9),
 p('Além do Tejo','Almada, Cacilhas e Boca do Vento',`<p>A travessia para Cacilhas muda a perspectiva: Lisboa passa a ser observada do outro lado do rio. O Cristo Rei oferece uma vista ampla; a Boca do Vento aproxima o visitante da margem; e Cacilhas convida a uma refeição de peixe e marisco.</p>`,'Cacilhas Almada',35,74,17,10)
 ],comer:'Campo de Ourique e Cacilhas são as duas opções mais naturais. A escolha depende do perfil adotado para o dia.',foto:'Lisboa vista de Almada, com a Ponte 25 de Abril e o Tejo.'}
 ]},
 sintra:{name:'Sintra',stay:'conteúdo em preparação',days:[]},obidos:{name:'Óbidos',stay:'conteúdo em preparação',days:[]},nazare:{name:'Nazaré',stay:'conteúdo em preparação',days:[]},fatima:{name:'Fátima',stay:'conteúdo em preparação',days:[]},evora:{name:'Évora',stay:'conteúdo em preparação',days:[]},algarve:{name:'Algarve',stay:'conteúdo em preparação',days:[]},porto:{name:'Porto',stay:'conteúdo em preparação',days:[]},douro:{name:'Douro',stay:'conteúdo em preparação',days:[]}
};
let currentCity=null,currentDay=null;
function show(id){document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0)}
function renderHome(){cityGrid.innerHTML=HOME_ORDER.map(k=>`<button class="city-btn ${k==='douro'?'wide':''}" onclick="openCity('${k}')" aria-label="Abrir ${DATA[k].name}"><img src="${BUTTONS[k]}" alt="${DATA[k].name}"></button>`).join('')}
function goHome(){currentCity=currentDay=null;show('home')}
function openCity(k){currentCity=k;const c=DATA[k];cityName.textContent=c.name;cityStay.textContent=c.stay;if(!c.days.length){dayList.innerHTML='<div class="notice">Este módulo já está preparado para receber os próximos mapas e textos.</div>'}else dayList.innerHTML=c.days.map(d=>`<button class="day-card" onclick="openDay('${d.id}')"><span class="badge">${d.label}</span><strong>${d.title}</strong><span class="arrow">›</span></button>`).join('');show('city')}
function backCity(){openCity(currentCity)}
function openDay(id){const c=DATA[currentCity];currentDay=c.days.find(d=>d.id===id);const d=currentDay;dayLabel.textContent=`${c.name} · ${d.label}`;dayTitle.textContent=d.title;mapImg.src=d.map;mapImg.alt=`Mapa ${d.label} — ${d.title}`;mapsLink.href=d.maps;hotspots.innerHTML=d.points.map((pt,i)=>`<button class="hotspot" style="left:${pt.x}%;top:${pt.y}%;width:${pt.w}%;height:${pt.h}%" onclick="openPoint(${i})" aria-label="Abrir ${pt.title}"></button>`).join('');topicNav.innerHTML=d.points.map((pt,i)=>`<button class="topic-chip" onclick="openPoint(${i})">${i+1}. ${pt.title}</button>`).join('');article.innerHTML=d.points.map((pt,i)=>sectionHtml(i,pt)).join('')+`<section class="article-section" id="panel-comer"><h2>Onde comer</h2><h3>Uma pausa integrada ao dia</h3><p>${d.comer}</p><div class="section-actions"><button class="btn" onclick="backMap()">↑ Voltar ao mapa</button></div></section><section class="article-section" id="panel-foto"><h2>Foto clássica</h2><h3>Uma imagem para guardar</h3><p>${d.foto}</p><div class="section-actions"><button class="btn" onclick="backMap()">↑ Voltar ao mapa</button></div></section>`;show('day')}
function sectionHtml(i,pt){const q=encodeURIComponent(pt.query);return `<section class="article-section" id="point-${i}"><h2>${pt.title}</h2><h3>${pt.subtitle}</h3>${pt.body}<div class="section-actions"><a class="btn primary" target="_blank" rel="noopener noreferrer" href="https://www.google.com/maps/search/?api=1&query=${q}">📍 Abrir este ponto</a><button class="btn" onclick="backMap()">↑ Voltar ao mapa</button></div></section>`}
function closeAll(){document.querySelectorAll('.article-section').forEach(s=>s.classList.remove('open'))}
function openPoint(i){closeAll();const el=document.getElementById(`point-${i}`);el.classList.add('open');el.scrollIntoView({behavior:'smooth',block:'start'})}
function openPanel(type){closeAll();const el=document.getElementById(`panel-${type}`);el.classList.add('open');el.scrollIntoView({behavior:'smooth',block:'start'})}
function backMap(){document.getElementById('mapWrap').scrollIntoView({behavior:'smooth',block:'start'})}
renderHome();
</script>
</body>
</html>
